nameOverride: ""
fullnameOverride: ""

replicaCount: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: null

image:
  repository: ""
  tag: ""
  pullPolicy: IfNotPresent

platform:
  tenant: ""
  app: ""
  environment: ""
  keyVaultUrl: ""
  appSettings:
    enabled: false
    existingConfigMap: ""
    mountPath: /app/config/app-settings.json

serviceAccount:
  create: true
  name: ""
  workloadIdentity:
    enabled: false
    clientId: ""

podLabels: {}
podAnnotations: {}

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

container:
  port: 8080
  env: {}

service:
  enabled: true
  type: ClusterIP
  port: 80

route:
  enabled: false
  gatewayName: shared-public
  gatewayNamespace: gateway-system
  hostnames: []
  pathPrefix: /

pdb:
  enabled: false
  minAvailable: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
