{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "platform-service.serviceAccountName" . }}
  labels:
    {{- include "platform-service.labels" . | nindent 4 }}
    {{- if .Values.serviceAccount.workloadIdentity.enabled }}
    azure.workload.identity/use: "true"
    {{- end }}
  {{- if and .Values.serviceAccount.workloadIdentity.enabled .Values.serviceAccount.workloadIdentity.clientId }}
  annotations:
    azure.workload.identity/client-id: {{ .Values.serviceAccount.workloadIdentity.clientId | quote }}
  {{- end }}
{{- end }}
