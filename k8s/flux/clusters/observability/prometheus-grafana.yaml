apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: observability
spec:
  interval: 10m
  chart:
    spec:
      chart: kube-prometheus-stack
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: observability
      interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    alertmanager:
      enabled: false

    grafana:
      enabled: true
      service:
        type: ClusterIP
      persistence:
        enabled: false
      # Demo-only password for a public blueprint. Replace this with a Secret
      # reference before using this pattern beyond local/demo environments.
      adminPassword: "demo-admin-password"

    prometheus:
      service:
        type: ClusterIP
      prometheusSpec:
        retention: 6h
        scrapeInterval: 30s
        evaluationInterval: 30s
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi

    kube-state-metrics:
      service:
        type: ClusterIP

    prometheus-node-exporter:
      service:
        type: ClusterIP
