apiVersion: v1
kind: ServiceAccount
metadata:
  name: gateway-tls-reader
  namespace: gateway-system
  annotations:
    azure.workload.identity/client-id: "<gateway-tls-identity-client-id>"
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: example-com-tls
  namespace: gateway-system
spec:
  provider: azure
  secretObjects:
    - secretName: example-com-tls
      type: kubernetes.io/tls
      data:
        - objectName: example-com
          key: tls.crt
        - objectName: example-com
          key: tls.key
  parameters:
    clientID: "<gateway-tls-identity-client-id>"
    keyvaultName: "kv-aks-platform"
    tenantId: "<tenant-id>"
    objects: |
      array:
        - |
          objectName: example-com
          objectType: secret
          objectVersion: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keyvault-tls-sync
  namespace: gateway-system
  labels:
    app: keyvault-tls-sync
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keyvault-tls-sync
  template:
    metadata:
      labels:
        app: keyvault-tls-sync
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: gateway-tls-reader
      priorityClassName: system-cluster-critical
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
          effect: NoSchedule
      containers:
        - name: sync
          image: registry.k8s.io/e2e-test-images/busybox:1.29-4
          command:
            - /bin/sleep
            - "1000000"
          volumeMounts:
            - name: tls
              mountPath: /mnt/secrets-store
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi
      volumes:
        - name: tls
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: example-com-tls
