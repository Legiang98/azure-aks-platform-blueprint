service:
  name: adservice

nameOverride: adservice

image:
  repository: ghcr.io/example/boutique-adservice
  tag: "0.1.0"
  pullPolicy: IfNotPresent

replicaCount: 1
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: null

container:
  port: 9555

serviceAccount:
  create: true
  name: adservice
  workloadIdentity:
    enabled: true
    clientId: ""

platform:
  tenant: boutique
  app: boutique-app
  environment: prod
  keyVaultUrl: ""
  appSettings:
    enabled: true
    existingConfigMap: adservice-app-settings
    mountPath: /app/config/app-settings.json

route:
  enabled: false
  gatewayName: shared-public
  gatewayNamespace: gateway-system
  hostnames:
    - boutique-app.example.com

nodeSelector:
  aks-platform.azure.com/node-purpose: user
  aks-platform.azure.com/capacity: spot
tolerations:
  - key: aks-platform.azure.com/capacity
    operator: Equal
    value: spot
    effect: NoSchedule
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/instance: adservice

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
