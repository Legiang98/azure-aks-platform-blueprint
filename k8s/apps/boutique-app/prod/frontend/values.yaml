service:
  name: frontend

nameOverride: frontend

image:
  repository: ghcr.io/example/boutique-frontend
  tag: "0.1.0"
  pullPolicy: IfNotPresent

replicaCount: 2
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: null

container:
  port: 8080

serviceAccount:
  create: true
  name: frontend
  workloadIdentity:
    enabled: true
    clientId: ""

platform:
  tenant: boutique
  app: boutique-app
  environment: prod
  keyVaultUrl: ""
  appSettings:
    enabled: true
    existingConfigMap: frontend-app-settings
    mountPath: /app/config/app-settings.json

route:
  enabled: true
  gatewayName: shared-public
  gatewayNamespace: gateway-system
  hostnames:
    - boutique-app.example.com

nodeSelector:
  aks-platform.azure.com/node-purpose: user
  aks-platform.azure.com/capacity: on-demand
tolerations: []
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/instance: frontend

pdb:
  enabled: true
  minAvailable: 1

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
