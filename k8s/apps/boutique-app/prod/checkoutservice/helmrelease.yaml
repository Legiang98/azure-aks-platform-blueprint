apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: checkoutservice
  namespace: tenant-boutique-prod
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: platform-service-chart
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    nameOverride: checkoutservice
    replicaCount: 2
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: null
    image:
      repository: <acr-name>.azurecr.io/boutique/checkoutservice
      tag: "0.1.0"
      pullPolicy: IfNotPresent
    platform:
      tenant: boutique
      app: boutique-app
      environment: prod
      keyVaultUrl: ""
      appSettings:
        enabled: true
        existingConfigMap: checkoutservice-app-settings
        mountPath: /app/config/app-settings.json
    serviceAccount:
      create: true
      name: checkoutservice
      workloadIdentity:
        enabled: true
        clientId: ""
    container:
      port: 5050
      env: {}
    service:
      enabled: true
      type: ClusterIP
      port: 80
    route:
      enabled: false
      gatewayName: shared-public
      gatewayNamespace: gateway-system
      hostnames:
        - boutique-app.example.com
      pathPrefix: /
    nodeSelector:
      aks-platform.azure.com/node-purpose: user
      aks-platform.azure.com/capacity: on-demand
    tolerations: []
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/instance: checkoutservice

    pdb:
      enabled: true
      minAvailable: 1

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
