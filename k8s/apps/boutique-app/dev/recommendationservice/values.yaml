service:
  name: recommendationservice

nameOverride: recommendationservice

image:
  repository: ghcr.io/example/boutique-recommendationservice
  tag: "0.1.0"
  pullPolicy: IfNotPresent

replicaCount: 1

container:
  port: 8080

serviceAccount:
  create: true
  name: recommendationservice
  workloadIdentity:
    enabled: true
    clientId: ""

platform:
  tenant: boutique
  app: boutique-app
  environment: dev
  keyVaultUrl: ""
  appSettings:
    enabled: true
    existingConfigMap: recommendationservice-app-settings
    mountPath: /app/config/app-settings.json

route:
  enabled: false
  gatewayName: shared-public
  gatewayNamespace: gateway-system
  hostnames:
    - boutique-app-dev.example.com

nodeSelector:
  aks-platform.azure.com/node-purpose: user
  aks-platform.azure.com/capacity: spot
tolerations:
  - key: aks-platform.azure.com/capacity
    operator: Equal
    value: spot
    effect: NoSchedule
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/instance: recommendationservice

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi
