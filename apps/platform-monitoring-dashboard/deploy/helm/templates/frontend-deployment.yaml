apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-monitoring-center-web
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/name: platform-monitoring-center-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-monitoring-center-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-monitoring-center-web
    spec:
      containers:
        - name: web
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          # VITE_API_BASE_URL is a build-time Vite setting. Leave it empty for
          # same-origin /api routing through ingress, or pass it during image build.
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
