apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-monitoring-center-web
  namespace: platform-monitoring
  labels:
    app.kubernetes.io/name: platform-monitoring-center-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-monitoring-center-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-monitoring-center-web
    spec:
      containers:
        - name: web
          image: ghcr.io/example/platform-monitoring-center-web:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 150m
              memory: 128Mi
