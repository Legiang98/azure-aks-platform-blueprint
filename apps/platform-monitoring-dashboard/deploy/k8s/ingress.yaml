apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform-monitoring-center
  namespace: platform-monitoring
  annotations:
    # Replace with the ingress controller annotation used in your AKS environment.
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: platform-monitoring.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: platform-monitoring-center-api
                port:
                  number: 8000
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: platform-monitoring-center-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: platform-monitoring-center-web
                port:
                  number: 80
