<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">AKS multi-tenant workload runtime blueprint</title>
  <desc id="desc">Layered AKS workload design with entry layer, tenant namespace, shared platform add-ons, node pools, data integration, observability, and security.</desc>
  <rect width="1280" height="760" fill="#f8fbff"/>
  <text x="640" y="48" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="700" fill="#0f172a">AKS Workload Runtime Blueprint</text>
  <text x="640" y="76" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#475569">Multi-tenant request context, namespace baseline, scaling, identity, data, observability, and security boundaries</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="52" y="104" width="980" height="92" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="944" y="132" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">Entry Layer</text>
    <g font-size="13" fill="#0f172a">
      <rect x="86" y="134" width="116" height="38" rx="7" fill="#ffffff" stroke="#64748b"/>
      <text x="144" y="158" text-anchor="middle">Client</text>
      <circle cx="272" cy="153" r="24" fill="#e0f2fe" stroke="#0284c7"/>
      <text x="272" y="158" text-anchor="middle" font-weight="700">DNS</text>
      <rect x="360" y="124" width="178" height="58" rx="7" fill="#e0f2fe" stroke="#0284c7"/>
      <text x="449" y="147" text-anchor="middle">Azure Front Door + WAF</text>
      <text x="449" y="166" text-anchor="middle" font-size="11" fill="#475569">TLS termination</text>
      <rect x="626" y="128" width="156" height="50" rx="7" fill="#ecfeff" stroke="#0891b2"/>
      <text x="704" y="149" text-anchor="middle">Shared Gateway</text>
      <text x="704" y="166" text-anchor="middle" font-size="11" fill="#475569">tenant HTTPRoute</text>
      <rect x="856" y="128" width="142" height="50" rx="7" fill="#fefce8" stroke="#ca8a04"/>
      <text x="927" y="149" text-anchor="middle">Certificates</text>
      <text x="927" y="166" text-anchor="middle" font-size="11" fill="#475569">cert-manager / KV</text>
    </g>

    <rect x="52" y="238" width="760" height="372" rx="8" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
    <text x="82" y="270" font-size="19" font-weight="700" fill="#0f172a">AKS Cluster</text>
    <rect x="250" y="250" width="448" height="28" rx="7" fill="#f0fdf4" stroke="#16a34a"/>
    <text x="474" y="269" text-anchor="middle" font-size="12" fill="#0f172a">Flux: shared Gateway + tenant baselines + tenant app HelmReleases</text>

    <rect x="82" y="300" width="456" height="284" rx="8" fill="#ffffff" stroke="#64748b"/>
    <text x="108" y="329" font-size="17" font-weight="700" fill="#0f172a">tenant namespace: tenant-boutique-prod</text>
    <rect x="350" y="309" width="78" height="22" rx="11" fill="#eff6ff" stroke="#60a5fa"/>
    <text x="389" y="324" text-anchor="middle" font-size="10" fill="#0f172a">dev tenant</text>
    <rect x="438" y="309" width="82" height="22" rx="11" fill="#dbeafe" stroke="#2563eb"/>
    <text x="479" y="324" text-anchor="middle" font-size="10" font-weight="700" fill="#0f172a">prod tenant</text>
    <rect x="108" y="350" width="402" height="38" rx="7" fill="#fefce8" stroke="#ca8a04"/>
    <text x="309" y="365" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">Tenant baseline</text>
    <text x="309" y="380" text-anchor="middle" font-size="10" fill="#475569">Namespace labels + ResourceQuota + LimitRange + NetworkPolicy</text>

    <rect x="108" y="410" width="402" height="58" rx="7" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="126" y="433" font-size="13" font-weight="700" fill="#0f172a">api-service</text>
    <text x="240" y="433" font-size="12" fill="#2563eb">Deployment</text>
    <text x="340" y="433" font-size="12" fill="#2563eb">Service</text>
    <text x="420" y="433" font-size="12" fill="#16a34a">HPA + probes + PDB</text>

    <rect x="108" y="486" width="402" height="58" rx="7" fill="#f8fafc" stroke="#94a3b8"/>
    <text x="126" y="509" font-size="13" font-weight="700" fill="#0f172a">worker-service</text>
    <text x="252" y="509" font-size="12" fill="#2563eb">Deployment</text>
    <text x="360" y="509" font-size="12" fill="#16a34a">KEDA queue length</text>
    <text x="126" y="528" font-size="12" fill="#0284c7">Service Bus consumer</text>

    <rect x="572" y="300" width="210" height="144" rx="8" fill="#ffffff" stroke="#64748b"/>
    <text x="677" y="329" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">shared platform add-ons</text>
    <rect x="594" y="354" width="74" height="34" rx="7" fill="#fefce8" stroke="#ca8a04"/>
    <text x="631" y="376" text-anchor="middle" font-size="11">cert-manager</text>
    <rect x="686" y="354" width="74" height="34" rx="7" fill="#f5f3ff" stroke="#7c3aed"/>
    <text x="723" y="376" text-anchor="middle" font-size="11">KV CSI</text>
    <rect x="594" y="400" width="74" height="34" rx="7" fill="#ecfdf5" stroke="#16a34a"/>
    <text x="631" y="422" text-anchor="middle" font-size="11">OTel</text>
    <rect x="686" y="400" width="74" height="34" rx="7" fill="#ecfeff" stroke="#0891b2"/>
    <text x="723" y="422" text-anchor="middle" font-size="11">Gateway</text>

    <rect x="572" y="472" width="210" height="112" rx="8" fill="#ffffff" stroke="#64748b"/>
    <text x="677" y="501" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">node pools</text>
    <rect x="594" y="524" width="74" height="34" rx="7" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="631" y="545" text-anchor="middle" font-size="11">system</text>
    <rect x="686" y="524" width="74" height="34" rx="7" fill="#e0f2fe" stroke="#0284c7"/>
    <text x="723" y="545" text-anchor="middle" font-size="11">user</text>

    <rect x="858" y="238" width="230" height="372" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="973" y="270" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Data + Integration</text>
    <g font-size="13">
      <rect x="894" y="316" width="158" height="42" rx="7" fill="#dbeafe" stroke="#2563eb"/>
      <text x="973" y="342" text-anchor="middle">Azure SQL private endpoint</text>
      <rect x="894" y="382" width="158" height="38" rx="7" fill="#fee2e2" stroke="#dc2626"/>
      <text x="973" y="407" text-anchor="middle">Redis Cache</text>
      <rect x="894" y="444" width="158" height="42" rx="7" fill="#e0f2fe" stroke="#0284c7"/>
      <text x="973" y="470" text-anchor="middle">Service Bus Queue</text>
      <rect x="894" y="510" width="158" height="38" rx="7" fill="#f5f3ff" stroke="#7c3aed"/>
      <text x="973" y="535" text-anchor="middle">Azure Key Vault</text>
      <rect x="894" y="570" width="158" height="38" rx="7" fill="#e0f2fe" stroke="#0284c7"/>
      <text x="973" y="595" text-anchor="middle">Private DNS</text>
    </g>

    <rect x="52" y="640" width="1036" height="82" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
    <text x="86" y="674" font-size="17" font-weight="700" fill="#0f172a">Observability + Security</text>
    <g font-size="12" fill="#0f172a">
      <text x="292" y="674" text-anchor="middle">Log Analytics</text>
      <text x="418" y="674" text-anchor="middle">Managed Grafana</text>
      <text x="560" y="674" text-anchor="middle">Application Insights</text>
      <text x="700" y="674" text-anchor="middle">NetworkPolicy</text>
      <text x="838" y="674" text-anchor="middle">Pod Security</text>
      <text x="982" y="674" text-anchor="middle">Image scanning</text>
    </g>
  </g>
</svg>
