input {
  http {
    port => 8080
    codec => json
  }
}

filter {
  mutate {
    add_field => {
      "ingest_source" => "otel-collector"
    }
  }

  if [resourceLogs] {
    mutate {
      add_field => {
        "[telemetry][type]" => "logs"
      }
    }

    split {
      field => "[resourceLogs]"
    }

    split {
      field => "[resourceLogs][scopeLogs]"
    }

    split {
      field => "[resourceLogs][scopeLogs][logRecords]"
    }

    ruby {
      code => '
        def otel_value(value)
          return nil if value.nil?
          return value["stringValue"] if value.key?("stringValue")
          return value["intValue"].to_i if value.key?("intValue")
          return value["doubleValue"].to_f if value.key?("doubleValue")
          return value["boolValue"] if value.key?("boolValue")

          if value.key?("arrayValue")
            values = value.dig("arrayValue", "values") || []
            return values.map { |v| otel_value(v) }
          end

          nil
        end

        resource_attrs = event.get("[resourceLogs][resource][attributes]") || []
        resource_attrs.each do |attr|
          key = attr["key"]
          val = otel_value(attr["value"] || {})
          event.set(key, val) if key && !val.nil?
        end

        scope = event.get("[resourceLogs][scopeLogs][scope]") || {}
        event.set("[scope][name]", scope["name"]) if scope["name"]
        event.set("[scope][version]", scope["version"]) if scope["version"]

        record = event.get("[resourceLogs][scopeLogs][logRecords]") || {}

        event.set("severity_text", record["severityText"]) if record["severityText"]
        event.set("severity_number", record["severityNumber"]) if record["severityNumber"]

        body = record["body"] || {}
        msg = otel_value(body)
        event.set("message", msg) if msg

        trace_id = record["traceId"]
        span_id = record["spanId"]

        event.set("trace_id", trace_id) if trace_id && trace_id != ""
        event.set("span_id", span_id) if span_id && span_id != ""

        log_attrs = record["attributes"] || []
        log_attrs.each do |attr|
          key = attr["key"]
          val = otel_value(attr["value"] || {})
          event.set(key, val) if key && !val.nil?
        end

        nanos = record["timeUnixNano"] || record["observedTimeUnixNano"]
        if nanos
          seconds = nanos.to_i / 1000000000.0
          event.set("@timestamp", LogStash::Timestamp.at(seconds))
        end
      '
    }

    mutate {
      remove_field => [
        "resourceLogs",
        "event",
        "headers",
        "host",
        "url",
        "http",
        "user_agent",
        "@version"
      ]
    }
  } else if [resourceSpans] {
    mutate {
      add_field => {
        "[telemetry][type]" => "traces"
      }
    }

    split {
      field => "[resourceSpans]"
    }

    split {
      field => "[resourceSpans][scopeSpans]"
    }

    split {
      field => "[resourceSpans][scopeSpans][spans]"
    }

    ruby {
      code => '
        def otel_value(value)
          return nil if value.nil?
          return value["stringValue"] if value.key?("stringValue")
          return value["intValue"].to_i if value.key?("intValue")
          return value["doubleValue"].to_f if value.key?("doubleValue")
          return value["boolValue"] if value.key?("boolValue")

          if value.key?("arrayValue")
            values = value.dig("arrayValue", "values") || []
            return values.map { |v| otel_value(v) }
          end

          nil
        end

        resource_attrs = event.get("[resourceSpans][resource][attributes]") || []
        resource_attrs.each do |attr|
          key = attr["key"]
          val = otel_value(attr["value"] || {})
          event.set(key, val) if key && !val.nil?
        end

        scope = event.get("[resourceSpans][scopeSpans][scope]") || {}
        event.set("[scope][name]", scope["name"]) if scope["name"]
        event.set("[scope][version]", scope["version"]) if scope["version"]

        span = event.get("[resourceSpans][scopeSpans][spans]") || {}

        event.set("trace_id", span["traceId"]) if span["traceId"]
        event.set("span_id", span["spanId"]) if span["spanId"]
        event.set("parent_span_id", span["parentSpanId"]) if span["parentSpanId"] && span["parentSpanId"] != ""

        event.set("[span][name]", span["name"]) if span["name"]
        event.set("[span][kind]", span["kind"]) if span["kind"]

        status = span["status"] || {}
        event.set("[span][status_code]", status["code"]) if status["code"]
        event.set("[span][status_message]", status["message"]) if status["message"]

        span_attrs = span["attributes"] || []
        span_attrs.each do |attr|
          key = attr["key"]
          val = otel_value(attr["value"] || {})
          event.set(key, val) if key && !val.nil?
        end

        start_nanos = span["startTimeUnixNano"]
        end_nanos = span["endTimeUnixNano"]

        if start_nanos
          start_seconds = start_nanos.to_i / 1000000000.0
          event.set("@timestamp", LogStash::Timestamp.at(start_seconds))
        end

        if start_nanos && end_nanos
          duration_ms = (end_nanos.to_i - start_nanos.to_i) / 1000000.0
          event.set("duration_ms", duration_ms)
        end
      '
    }

    mutate {
      remove_field => [
        "resourceSpans",
        "event",
        "headers",
        "host",
        "url",
        "http",
        "user_agent",
        "@version"
      ]
    }
  } else {
    drop {}
  }
}

output {
  if [telemetry][type] == "logs" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "app-otel-logs-%{+YYYY.MM.dd}"
    }
  } else if [telemetry][type] == "traces" {
    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "app-otel-traces-%{+YYYY.MM.dd}"
    }
  }

  stdout {
    codec => rubydebug
  }
}
